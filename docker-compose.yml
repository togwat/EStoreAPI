services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # read-only role for the agent SQL tool, created by db/init on first init
      AGENT_DB_USER: ${AGENT_DB_USER}
      AGENT_DB_PASSWORD: ${AGENT_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./EStoreAPI.Server
    image: estoreapi-server:latest
    environment:
      ASPNETCORE_URLS: "http://+:5100"
      ConnectionStrings__WebAPIDatabase: "Host=db; Port=5432; Database=${DB_NAME}; Username=${DB_USER}; Password=${DB_PASSWORD};"
      ConnectionStrings__ReadOnlyDatabase: "Host=db; Port=5432; Database=${DB_NAME}; Username=${AGENT_DB_USER}; Password=${AGENT_DB_PASSWORD};"
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  mem0-db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${MEM0_DB_USER}
      POSTGRES_PASSWORD: ${MEM0_DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - mem0_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEM0_DB_USER:-mem0} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent:
    build: ./estoreapi.agent
    image: estoreapi-agent:latest
    environment:
      PROVIDER: ${PROVIDER}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_HOST: ${OLLAMA_HOST}
      DEEPSEEK_KEY: ${DEEPSEEK_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      API_BASE_URL: http://api:5100
      AGENT_PORT: 8000
      TAVILY_KEY: ${TAVILY_KEY}
      MEMORY_ENABLED: ${MEMORY_ENABLED}
      MEM0_DB_HOST: mem0-db
      MEM0_DB_PORT: 5432
      MEM0_DB_USER: ${MEM0_DB_USER}
      MEM0_DB_PASSWORD: ${MEM0_DB_PASSWORD}
      MEM0_LLM_MODEL: ${MEM0_LLM_MODEL}
      MEM0_EMBEDDING_MODEL: ${MEM0_EMBEDDING_MODEL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - agent_descriptions:/app/tools/descriptions
    depends_on:
      api:
        condition: service_started
      mem0-db:
        condition: service_healthy

  client:
    build: ./estoreapi.client
    image: estoreapi-client:latest
    ports:
      - "80:80"
    depends_on:
      - api
      - agent

volumes:
  postgres_data:
  agent_descriptions:
  mem0_postgres_data: