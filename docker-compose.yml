services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./EStoreAPI.Server
    image: estoreapi-server:latest
    environment:
      ConnectionStrings__WebAPIDatabase: "Host=db; Port=5432; Database=${DB_NAME}; Username=${DB_USER}; Password=${DB_PASSWORD};"
    depends_on:
      db:
        condition: service_healthy

  agent:
    build: ./estoreapi.agent
    image: estoreapi-agent:latest
    environment:
      PROVIDER: ${PROVIDER}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_HOST: http://host.docker.internal:11434
      API_BASE_URL: http://api:5100
      AGENT_PORT: 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_started

  client:
    build: ./estoreapi.client
    image: estoreapi-client:latest
    ports:
      - "80:80"
    depends_on:
      - api
      - agent

volumes:
  postgres_data: