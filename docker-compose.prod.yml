services:
  db:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production

  agent:
    restart: unless-stopped

  client:
    restart: unless-stopped

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
