# in prod environment, limit the amount of logs outputted via log rotation
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    restart: unless-stopped
    logging: *default-logging
  api:
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    logging: *default-logging

  agent:
    restart: unless-stopped
    logging: *default-logging

  client:
    restart: unless-stopped
    ports:
      - "8080:80"
    logging: *default-logging

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging
