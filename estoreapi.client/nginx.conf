server {
    listen 80;
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # handles React Router
    }

    location /api/ {
        proxy_pass http://api:5100;        # forwards /api/* to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # google's OAuth callback, handled by the ASP.NET auth middleware
    location = /signin-google {
        proxy_pass http://api:5100;
        proxy_set_header Host $host;
    }

    location /agent/ {
        # the agent cannot validate ASP.NET session cookies itself, so nginx asks the API before proxying
        auth_request /internal/auth-verify;
        # capture the identity header returned by /api/auth/verify and forward it to the agent
        # the agent trusts this header for user_id, never the request body
        auth_request_set $user_email $upstream_http_x_user_email;
        proxy_set_header X-User-Email $user_email;
        proxy_pass http://agent:8000;
        proxy_read_timeout 300s;           # default 60s
    }

    # subrequest target for auth_request, not reachable from outside
    location = /internal/auth-verify {
        internal;
        proxy_pass http://api:5100/api/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # fallback
    error_page  404              /index.html;
}