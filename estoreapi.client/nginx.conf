server {
    listen 80;
    
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # handles React Router
    }

    location /api/ {
        proxy_pass http://api:5100;        # forwards /api/* to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /agent/ {
        proxy_pass http://agent:8000;
        proxy_read_timeout 300s;           # default is 60s
    }

    # fallback
    error_page  404              /index.html;
}